# Zemtik configuration file
# Copy to ~/.zemtik/config.yaml and uncomment fields to override defaults.
# All paths default to ~/.zemtik/...
# Environment variables and CLI flags take precedence over this file.

proxy_port: 4000
# circuit_dir: ~/.zemtik/circuit
# runs_dir: ~/.zemtik/runs
# keys_dir: ~/.zemtik/keys
# db_path: ~/.zemtik/zemtik.db
# receipts_db_path: ~/.zemtik/receipts.db
# receipts_dir: ~/.zemtik/receipts

# Seconds before bb verify is abandoned on timeout (not killed in v0.5.1).
# Also configurable via ZEMTIK_VERIFY_TIMEOUT_SECS env var.
# zemtik_verify_timeout_secs: 120
