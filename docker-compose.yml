# Zemtik Proxy — Demo Deployment
# Pin this tag during pilot. Update manually for upgrades.
#
# Quick start — proxy only (OpenAI):
#   export OPENAI_API_KEY=sk-...
#   docker compose up --build
#
# Quick start — proxy only (Anthropic, no OpenAI key needed):
#   export ZEMTIK_ANTHROPIC_API_KEY=sk-ant-...
#   export ZEMTIK_PROXY_API_KEY=sk-...   # clients send this as Bearer token (required)
#   ZEMTIK_LLM_PROVIDER=anthropic docker compose up --build
#
# Quick start — proxy only (Gemini, no OpenAI key needed):
#   export ZEMTIK_GEMINI_API_KEY=AIza-...
#   export ZEMTIK_PROXY_API_KEY=sk-...   # clients send this as Bearer token (required)
#   ZEMTIK_LLM_PROVIDER=gemini docker compose up --build
#
# MCP attestation server only (no LLM API key needed — use with Claude Desktop):
#   export ZEMTIK_MCP_API_KEY=<secret>
#   docker compose --profile mcp up
#
# With Anonymizer v1 (PII tokenization via GLiNER sidecar) — CPU, pre-built image:
#   export OPENAI_API_KEY=sk-...   # or ZEMTIK_ANTHROPIC_API_KEY
#   ZEMTIK_ANONYMIZER_ENABLED=true docker compose --profile anonymizer up
#
# With Anonymizer v1 — GPU (CUDA 12.4, driver ≥ 550, nvidia-container-toolkit required):
#   export OPENAI_API_KEY=sk-...
#   export HF_TOKEN=hf_...         # optional: authenticated HF CDN (faster + cache-stable)
#   INSTALL_CUDA=true DOCKER_BUILDKIT=1 docker compose --profile anonymizer build --secret id=hf_token,env=HF_TOKEN
#   ZEMTIK_ANONYMIZER_ENABLED=true docker compose --profile anonymizer up
#
# The proxy listens on http://localhost:4000 and intercepts POST /v1/chat/completions.
# Point your existing OpenAI client at localhost:4000 — no code changes needed.
# OPENAI_API_KEY is only required when ZEMTIK_LLM_PROVIDER=openai (the default).
# It is not needed when using Anthropic or when running only the MCP server.

services:
  # Anonymizer sidecar (GLiNER + Presidio gRPC server on port 50051).
  # Only started when --profile anonymizer is passed. The zemtik proxy starts
  # without it when ZEMTIK_ANONYMIZER_ENABLED=false (the default).
  sidecar:
    profiles: ["anonymizer"]
    # Pre-built CPU image published to GHCR on every release (linux/amd64 only).
    # To build locally (required for GPU/CUDA or arm64):
    #   INSTALL_CUDA=true docker compose --profile anonymizer build
    image: ghcr.io/dacarva/zemtik-sidecar:v0.17.1
    build:
      context: .
      dockerfile: sidecar/Dockerfile
      args:
        # Set INSTALL_CUDA=true to build with CUDA torch (GPU inference, ~50-100ms vs ~1-2s on CPU).
        # Requires nvidia-container-toolkit on the host and driver >= 550 (CUDA 12.4).
        INSTALL_CUDA: "${INSTALL_CUDA:-false}"
    expose:
      - "50051"
    # GPU: uncomment the deploy block below when INSTALL_CUDA=true.
    # Requires nvidia-container-toolkit: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "grpc-health-probe", "-addr=localhost:50051", "-service=zemtik.anonymizer.v1.AnonymizerService"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    restart: unless-stopped

  zemtik:
    build:
      context: .
      args:
        # Set to "true" to install nargo + bb inside the image for ZK SlowLane support.
        # REQUIRED when INSTALL_ZK_TOOLS=true: also set RUNTIME_IMAGE and BUILDER_IMAGE
        # to ubuntu:24.04 — bb nightly binaries require glibc >= 2.38 (GLIBC_2.38/2.39).
        # Debian Bookworm (the default runtime) ships glibc 2.36 and will fail at runtime.
        # Also remove the ZEMTIK_SKIP_CIRCUIT_VALIDATION line below and uncomment the
        # zemtik_srs volume mount so the ~1GB SRS is cached across container restarts.
        #
        # ZK SlowLane build:
        #   INSTALL_ZK_TOOLS=true RUNTIME_IMAGE=ubuntu:24.04 BUILDER_IMAGE=ubuntu:24.04 \
        #     docker compose up --build
        INSTALL_ZK_TOOLS: "${INSTALL_ZK_TOOLS:-false}"
        RUNTIME_IMAGE: "${RUNTIME_IMAGE:-debian:bookworm-slim}"
        BUILDER_IMAGE: "${BUILDER_IMAGE:-rust:1.88-bookworm}"
        BUILD_FEATURES: "${BUILD_FEATURES:-regex-only}"
    # Local image tag. Use ZEMTIK_VARIANT to avoid overwriting between builds:
    #   FastLane (default):  docker compose up --build
    #   ZK SlowLane:         ZEMTIK_VARIANT=zk INSTALL_ZK_TOOLS=true docker compose up --build
    image: zemtik-core:${ZEMTIK_VARIANT:-fastlane}
    # Pre-built pulls (alternative to building locally):
    # image: ghcr.io/dacarva/zemtik-core:v0.8.1
    ports:
      - "4000:4000"
    environment:
      # Bind to 0.0.0.0 so the port is reachable from outside the container.
      - ZEMTIK_BIND_ADDR=0.0.0.0:4000
      # Regex intent backend: no ONNX model download (~130MB) on first start.
      # Switch to ZEMTIK_INTENT_BACKEND=embed for embedding-based intent matching.
      - ZEMTIK_INTENT_BACKEND=embed
      - ZEMTIK_INTENT_THRESHOLD=0.50
      # Skip nargo/bb circuit validation — FastLane works without ZK tools.
      # Remove this line to enable ZK SlowLane (requires nargo+bb in the image).
      - ZEMTIK_SKIP_CIRCUIT_VALIDATION=1
      # LLM provider: openai (default) or anthropic.
      # Set ZEMTIK_LLM_PROVIDER=anthropic and ZEMTIK_ANTHROPIC_API_KEY to use Anthropic instead.
      # OPENAI_API_KEY is only required when ZEMTIK_LLM_PROVIDER=openai.
      # Neither key is needed when running only --profile mcp (Claude Desktop usage).
      - ZEMTIK_LLM_PROVIDER=${ZEMTIK_LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ZEMTIK_ANTHROPIC_API_KEY=${ZEMTIK_ANTHROPIC_API_KEY:-}
      - ZEMTIK_ANTHROPIC_MODEL=${ZEMTIK_ANTHROPIC_MODEL:-}
      - ZEMTIK_GEMINI_API_KEY=${ZEMTIK_GEMINI_API_KEY:-}
      - ZEMTIK_GEMINI_MODEL=${ZEMTIK_GEMINI_MODEL:-}
      # Required when ZEMTIK_LLM_PROVIDER=anthropic or gemini: clients send this as Bearer token.
      # Keeps the provider API key server-side — clients never see it.
      - ZEMTIK_PROXY_API_KEY=${ZEMTIK_PROXY_API_KEY:-}
      # Anonymizer v1: enabled only when running with --profile anonymizer.
      # The sidecar address uses the Docker Compose service name as the hostname.
      - ZEMTIK_ANONYMIZER_SIDECAR_ADDR=http://sidecar:50051
      - ZEMTIK_ANONYMIZER_ENABLED=${ZEMTIK_ANONYMIZER_ENABLED:-false}
      - ZEMTIK_ANONYMIZER_ENTITY_TYPES=${ZEMTIK_ANONYMIZER_ENTITY_TYPES:-PERSON,ORG,LOCATION,CO_NIT,CO_CEDULA,AR_DNI,CL_RUT,BR_CPF,BR_CNPJ,MX_CURP,MX_RFC,ES_NIF,IBAN_CODE,DATE_TIME,MONEY}
      - ZEMTIK_ANONYMIZER_DEBUG_PREVIEW=${ZEMTIK_ANONYMIZER_DEBUG_PREVIEW:-false}
      # GLiNER runs on CPU in Docker — inference takes 2-4s on first call. Default 1500ms is too tight.
      - ZEMTIK_ANONYMIZER_SIDECAR_TIMEOUT_MS=${ZEMTIK_ANONYMIZER_SIDECAR_TIMEOUT_MS:-5000}
      # OpenAI model forwarded to api.openai.com. gpt-5.4-nano is the current default.
      - ZEMTIK_OPENAI_MODEL=${ZEMTIK_OPENAI_MODEL:-gpt-5.4-nano}
      # Client ID used for DB filtering (default demo dataset uses 123).
      - ZEMTIK_CLIENT_ID=${ZEMTIK_CLIENT_ID:-123}
      # CORS: allow all origins for demo. Restrict in production.
      - ZEMTIK_CORS_ORIGINS=*
      # General Passthrough: forward non-data queries to OpenAI instead of returning 400.
      - ZEMTIK_GENERAL_PASSTHROUGH=1
      # Rate-limit the general passthrough lane to prevent runaway usage.
      - ZEMTIK_GENERAL_MAX_RPM=60
      # --- Tunnel Mode (pilot evaluation) ---
      # Uncomment these three lines to run Zemtik in transparent verification mode.
      # Tunnel mode forwards all traffic to OpenAI untouched while running ZK
      # verification in the background and logging comparison results. Safe to
      # enable in production — no customer request or response is ever modified.
      # - ZEMTIK_MODE=tunnel
      # - ZEMTIK_TUNNEL_API_KEY=${OPENAI_API_KEY}
      # - ZEMTIK_DASHBOARD_API_KEY=${ZEMTIK_DASHBOARD_API_KEY:-changeme}
      # Store receipts.db inside the persisted receipts/ directory so it survives restarts.
      # Without this, /verify/<id> links break after container recreate.
      - ZEMTIK_RECEIPTS_DB_PATH=/home/zemtik/.zemtik/receipts/receipts.db
    volumes:
      # Persist keys across container restarts so attestation_hash is stable.
      - zemtik_keys:/home/zemtik/.zemtik/keys
      # Persist compliance receipts DB (bundles + receipts.db index).
      - zemtik_receipts:/home/zemtik/.zemtik/receipts
      # Mount the example schema_config so the proxy recognises aws_spend, travel, payroll, etc.
      - ./schema_config.example.json:/home/zemtik/.zemtik/schema_config.json:ro
      # Cache BGE-small-en ONNX model (~130MB) so it's not re-downloaded on restart.
      - zemtik_models:/home/zemtik/.zemtik/models
      # Optional: cache the bb SRS (~1GB) across restarts when INSTALL_ZK_TOOLS=true.
      # - zemtik_srs:/home/zemtik/.bb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      start_period: 120s
      retries: 3
    restart: unless-stopped

  # MCP attestation HTTP server on port 4001.
  # Start with: ZEMTIK_ANONYMIZER_ENABLED=true docker compose --profile anonymizer --profile mcp up
  # Or standalone: docker compose --profile mcp up
  mcp:
    profiles: ["mcp"]
    image: zemtik-core:${ZEMTIK_VARIANT:-fastlane}
    command: ["mcp-serve"]
    depends_on:
      zemtik:
        condition: service_healthy
        required: false
      sidecar:
        condition: service_healthy
        required: false
    ports:
      - "4001:4001"
    environment:
      - ZEMTIK_MCP_BIND_ADDR=0.0.0.0:4001
      - ZEMTIK_MCP_API_KEY=${ZEMTIK_MCP_API_KEY:?Set ZEMTIK_MCP_API_KEY before running with --profile mcp}
      - ZEMTIK_MCP_MODE=${ZEMTIK_MCP_MODE:-tunnel}
      - ZEMTIK_MCP_FETCH_TIMEOUT_SECS=${ZEMTIK_MCP_FETCH_TIMEOUT_SECS:-30}
      - ZEMTIK_MCP_ALLOWED_FETCH_DOMAINS=${ZEMTIK_MCP_ALLOWED_FETCH_DOMAINS:-}
      # Host file access: set ZEMTIK_MCP_HOST_DIR on the host (default: ~/Downloads).
      # Files land at /home/zemtik/host-files/ inside the container.
      # ZEMTIK_MCP_ALLOWED_PATHS restricts which paths zemtik_read_file may open.
      - ZEMTIK_MCP_ALLOWED_PATHS=/home/zemtik/host-files/**
      - ZEMTIK_SKIP_CIRCUIT_VALIDATION=1
      - ZEMTIK_SKIP_DB_VALIDATION=1
      # Anonymizer: enables zemtik_analyze tool. Requires --profile anonymizer (sidecar on port 50051).
      - ZEMTIK_ANONYMIZER_ENABLED=${ZEMTIK_ANONYMIZER_ENABLED:-false}
      - ZEMTIK_ANONYMIZER_SIDECAR_ADDR=http://sidecar:50051
      # MCP gets a longer timeout than proxy: full legal documents need 8-15s on CPU GLiNER.
      - ZEMTIK_ANONYMIZER_SIDECAR_TIMEOUT_MS=${ZEMTIK_ANONYMIZER_SIDECAR_TIMEOUT_MS:-60000}
      - ZEMTIK_ANONYMIZER_FALLBACK_REGEX=${ZEMTIK_ANONYMIZER_FALLBACK_REGEX:-true}
      - ZEMTIK_ANONYMIZER_ENTITY_TYPES=${ZEMTIK_ANONYMIZER_ENTITY_TYPES:-PERSON,ORG,LOCATION,CO_NIT,CO_CEDULA,AR_DNI,CL_RUT,BR_CPF,BR_CNPJ,MX_CURP,MX_RFC,ES_NIF,IBAN_CODE,DATE_TIME,MONEY}
      # Debug: store plaintext input/output in mcp_audit.db previews. Disable in production.
      - ZEMTIK_ANONYMIZER_DEBUG_PREVIEW=${ZEMTIK_ANONYMIZER_DEBUG_PREVIEW:-false}
    volumes:
      - ${ZEMTIK_MCP_HOST_DIR:-${HOME}/Downloads}:/home/zemtik/host-files:ro
      - zemtik_keys:/home/zemtik/.zemtik/keys
      - zemtik_mcp_audit:/home/zemtik/.zemtik
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/mcp/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

secrets:
  hf_token:
    environment: HF_TOKEN   # pulled from host env; omit or leave unset to build unauthenticated

volumes:
  zemtik_keys:
  zemtik_receipts:
  zemtik_models:
  zemtik_mcp_audit:
  # Uncomment when INSTALL_ZK_TOOLS=true to persist the bb SRS cache (~1GB).
  # zemtik_srs:
