name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      # Postgres service is scaffolding for future DB_BACKEND=supabase integration tests.
      # Current tests use ZEMTIK_SKIP_DB_VALIDATION=1 (SQLite only); DATABASE_URL is not wired.
      # Wire up with: DATABASE_URL=postgres://postgres:testpass@localhost:5432/zemtik_test
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: zemtik_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install OpenSSL dev headers
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libssl-dev

      - name: Run unit tests (regex-only, no embedding model)
        run: cargo test --no-default-features --features regex-only

      - name: Run integration tests (non-ZK, no nargo/bb needed)
        run: cargo test --test integration_proxy --no-default-features --features regex-only
        env:
          ZEMTIK_SKIP_CIRCUIT_VALIDATION: "1"
          ZEMTIK_INTENT_BACKEND: regex
          ZEMTIK_SKIP_DB_VALIDATION: "1"

      - name: Run tunnel integration tests
        run: cargo test --test integration_tunnel --no-default-features --features regex-only
        env:
          ZEMTIK_SKIP_CIRCUIT_VALIDATION: "1"
          ZEMTIK_INTENT_BACKEND: regex
          ZEMTIK_SKIP_DB_VALIDATION: "1"
          ZEMTIK_TUNNEL_API_KEY: ci-test-tunnel-key

      - name: Run MCP integration tests
        run: cargo test --test integration_mcp --test integration_mcp_serve --no-default-features --features regex-only
        env:
          ZEMTIK_SKIP_CIRCUIT_VALIDATION: "1"
          ZEMTIK_SKIP_DB_VALIDATION: "1"
          ZEMTIK_MCP_API_KEY: ci-test-mcp-key

      - name: Run anonymizer integration tests
        run: cargo test --test integration_anonymizer --no-default-features --features regex-only
        env:
          ZEMTIK_SKIP_CIRCUIT_VALIDATION: "1"
          ZEMTIK_SKIP_DB_VALIDATION: "1"

  docker:
    name: Docker Build (linux/amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build image (linux/amd64, no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          tags: zemtik-core:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build anonymizer sidecar (smoke test)
        run: DOCKER_BUILDKIT=1 docker build -f sidecar/Dockerfile -t zemtik-sidecar:ci . --quiet

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-clippy-

      - name: Install OpenSSL dev headers
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libssl-dev

      - name: Clippy (regex-only)
        run: cargo clippy --no-default-features --features regex-only -- -D warnings

      - name: Check embed feature compiles
        run: cargo check --features embed

      - name: Clippy (embed)
        run: cargo clippy --features embed -- -D warnings
