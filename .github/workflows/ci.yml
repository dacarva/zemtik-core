name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install OpenSSL dev headers
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libssl-dev

      - name: Run unit tests (regex-only, no embedding model)
        run: cargo test --no-default-features --features regex-only

      - name: Run integration tests (non-ZK, no nargo/bb needed)
        run: cargo test --test integration_proxy --no-default-features --features regex-only
        env:
          ZEMTIK_SKIP_CIRCUIT_VALIDATION: "1"
          ZEMTIK_INTENT_BACKEND: regex

  docker:
    name: Docker Build (linux/amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (linux/amd64, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          tags: zemtik-core:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-clippy-

      - name: Install OpenSSL dev headers
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libssl-dev

      - name: Clippy
        run: cargo clippy --no-default-features --features regex-only -- -D warnings
