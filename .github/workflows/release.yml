name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  eval:
    name: Intent Engine Eval Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-eval-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-eval-cargo-

      - name: Cache intent engine model
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.zemtik/models
          key: zemtik-bge-small-en-v1

      - name: Run intent eval gate (≥95% accuracy required)
        run: cargo run --bin intent-eval --features eval

  build:
    needs: eval
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            extra_args: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            extra_args: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            # ORT (fastembed ONNX runtime) has ABI issues on Windows — skip embedding features
            extra_args: "--no-default-features"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install OpenSSL (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Cache cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install OpenSSL (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          vcpkg install openssl:x64-windows-static-md
          "OPENSSL_DIR=C:/vcpkg/installed/x64-windows-static-md" >> $env:GITHUB_ENV
          "OPENSSL_STATIC=1" >> $env:GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.extra_args }}

      - name: Create release archive
        shell: bash
        run: |
          BINARY_NAME="zemtik"
          ARCHIVE_NAME="${BINARY_NAME}-${{ github.ref_name }}-${{ matrix.target }}"
          EXT="${{ matrix.archive }}"
          # Windows binary has .exe suffix
          BIN_SUFFIX=""
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            BIN_SUFFIX=".exe"
          fi

          mkdir -p "dist/$ARCHIVE_NAME"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}${BIN_SUFFIX}" "dist/$ARCHIVE_NAME/"
          if [ ! -f install.sh ]; then echo "ERROR: install.sh not found"; exit 1; fi
          cp install.sh "dist/$ARCHIVE_NAME/"
          cp config.example.yaml "dist/$ARCHIVE_NAME/"
          if [ -f README.md ]; then cp README.md "dist/$ARCHIVE_NAME/"; fi

          cd dist
          if [ "$EXT" = "zip" ]; then
            # zip is not in Git Bash on windows-latest; fall back to pwsh Compress-Archive
            if command -v zip &>/dev/null; then
              zip -r "${ARCHIVE_NAME}.zip" "$ARCHIVE_NAME"
            elif command -v pwsh &>/dev/null; then
              pwsh -Command "Compress-Archive -Path '${ARCHIVE_NAME}' -DestinationPath '${ARCHIVE_NAME}.zip'"
            else
              echo "ERROR: neither zip nor pwsh available" >&2; exit 1
            fi
            echo "ARCHIVE=dist/${ARCHIVE_NAME}.zip" >> $GITHUB_ENV
            echo "ARCHIVE_NAME=${ARCHIVE_NAME}.zip" >> $GITHUB_ENV
          else
            tar czf "${ARCHIVE_NAME}.tar.gz" "$ARCHIVE_NAME"
            echo "ARCHIVE=dist/${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV
            echo "ARCHIVE_NAME=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV
          fi
          # Expose binary path for package-mcpb job
          echo "BINARY_PATH=dist/$ARCHIVE_NAME/${BINARY_NAME}${BIN_SUFFIX}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

      - name: Upload binary (for mcpb packaging)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: binary-${{ matrix.target }}
          path: ${{ env.BINARY_PATH }}

  docker:
    name: Docker (linux/amd64 + linux/arm64)
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up QEMU (for linux/arm64 cross-build)
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-proxy
          cache-to: type=gha,mode=max,scope=docker-proxy

  docker-sidecar:
    name: Docker sidecar (linux/amd64, CPU-only)
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (sidecar)
        id: meta-sidecar
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/zemtik-sidecar
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push sidecar (linux/amd64, CPU)
        # arm64 omitted: QEMU emulation of PyTorch/C++ compilation takes 45-60+ min.
        # GPU (CUDA) variant requires INSTALL_CUDA=true local build — see README.
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: sidecar/Dockerfile
          build-args: INSTALL_CUDA=false
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-sidecar.outputs.tags }}
          labels: ${{ steps.meta-sidecar.outputs.labels }}
          cache-from: type=gha,scope=docker-sidecar
          cache-to: type=gha,mode=max,scope=docker-sidecar

  package-mcpb:
    name: Package .mcpb (${{ matrix.label }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            label: macos
            mcpb_name: zemtik-macos.mcpb
            bin_name: zemtik
          - target: x86_64-unknown-linux-gnu
            label: linux
            mcpb_name: zemtik-linux.mcpb
            bin_name: zemtik
          - target: x86_64-pc-windows-msvc
            label: windows
            mcpb_name: zemtik-windows.mcpb
            bin_name: zemtik.exe
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install mcpb
        run: npm install -g @anthropic-ai/mcpb@2.1.2

      - name: Download binary artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: binary-${{ matrix.target }}
          path: packages/zemtik-mcp/

      - name: Prepare binary
        run: |
          # Keep .exe extension on Windows — stripping it breaks execution.
          # manifest.json entry_point "zemtik" matches on macOS/Linux; Windows uses "zemtik.exe".
          if [ "${{ matrix.bin_name }}" = "zemtik.exe" ]; then
            # Windows: keep zemtik.exe as-is; mcpb resolves "zemtik" entry_point to zemtik.exe on Windows.
            if [ ! -f "packages/zemtik-mcp/zemtik.exe" ]; then
              echo "ERROR: packages/zemtik-mcp/zemtik.exe not found" >&2; exit 1
            fi
          else
            if [ ! -f "packages/zemtik-mcp/${{ matrix.bin_name }}" ]; then
              echo "ERROR: packages/zemtik-mcp/${{ matrix.bin_name }} not found" >&2; exit 1
            fi
            if [ "${{ matrix.bin_name }}" != "zemtik" ]; then
              mv "packages/zemtik-mcp/${{ matrix.bin_name }}" packages/zemtik-mcp/zemtik
            fi
            chmod +x packages/zemtik-mcp/zemtik
          fi

      - name: Pack .mcpb
        run: mcpb pack packages/zemtik-mcp/ ${{ matrix.mcpb_name }}

      - name: Upload .mcpb artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mcpb-${{ matrix.label }}
          path: ${{ matrix.mcpb_name }}

  release:
    name: Create GitHub Release
    needs: [eval, build, docker, docker-sidecar, package-mcpb]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/**/*.mcpb
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
