name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  eval:
    name: Intent Engine Eval Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-eval-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-eval-cargo-

      - name: Cache intent engine model
        uses: actions/cache@v4
        with:
          path: ~/.zemtik/models
          key: zemtik-bge-small-en-v1

      - name: Run intent eval gate (≥95% accuracy required)
        run: cargo run --bin intent-eval --features eval

  build:
    needs: eval
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install OpenSSL (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Enable multiarch and install aarch64 cross-toolchain (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64
          # Ubuntu 24.04+ uses DEB822 format (ubuntu.sources); restrict existing entries to amd64
          # so apt-get update doesn't try to fetch arm64 packages from security.ubuntu.com (404)
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i 's/^Types: deb$/Types: deb\nArchitectures: amd64/' /etc/apt/sources.list.d/ubuntu.sources
          fi
          # Also handle old-format sources.list (Ubuntu < 24.04)
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list 2>/dev/null || true
          # Add arm64 packages from ports.ubuntu.com
          printf 'deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports %s main restricted universe multiverse\ndeb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports %s-updates main restricted universe multiverse\n' \
            "$(lsb_release -cs)" "$(lsb_release -cs)" | sudo tee /etc/apt/sources.list.d/arm64-ports.list
          sudo apt-get update -qq
          sudo apt-get install -y gcc-aarch64-linux-gnu libssl-dev:arm64
          echo 'PKG_CONFIG_ALLOW_CROSS=1' >> "$GITHUB_ENV"
          echo 'PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig' >> "$GITHUB_ENV"
          echo 'OPENSSL_INCLUDE_DIR=/usr/include' >> "$GITHUB_ENV"
          echo 'OPENSSL_LIB_DIR=/usr/lib/aarch64-linux-gnu' >> "$GITHUB_ENV"
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create release archive
        shell: bash
        run: |
          BINARY_NAME="zemtik"
          ARCHIVE_NAME="${BINARY_NAME}-${{ github.ref_name }}-${{ matrix.target }}"

          mkdir -p "dist/$ARCHIVE_NAME"
          cp "target/${{ matrix.target }}/release/$BINARY_NAME" "dist/$ARCHIVE_NAME/"
          cp install.sh "dist/$ARCHIVE_NAME/"
          cp config.example.yaml "dist/$ARCHIVE_NAME/"
          if [ -f README.md ]; then cp README.md "dist/$ARCHIVE_NAME/"; fi

          cd dist
          tar czf "${ARCHIVE_NAME}.tar.gz" "$ARCHIVE_NAME"
          echo "ARCHIVE=dist/${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
